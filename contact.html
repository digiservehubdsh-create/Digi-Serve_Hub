<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Digi-Serve Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1 class="logo">Digi-Serve Hub</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="section-dark">
    <div class="contact-card">
        <h2>Let’s Build Something Meaningful</h2>
        <p>Share your project details and we’ll connect with you directly on WhatsApp.</p>

        <form onsubmit="sendToWhatsApp(); return false;" class="contact-form">
            <input type="text" id="name" placeholder="Your Full Name" required>
            <input type="email" id="email" placeholder="Your Email Address" required>
            <input type="tel" id="phone" placeholder="Your Phone Number" required>
            <textarea id="message" placeholder="Describe your project..." required></textarea>
            <button type="submit" class="submit-btn">Send via WhatsApp</button>
        </form>
    </div>
</section>

<footer>
    <p>© 2026 Digi-Serve Hub. All Rights Reserved.</p>
</footer>

<script>
function sendToWhatsApp() {
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var message = document.getElementById("message").value;

    var text = "Hello Digi-Serve Hub,%0A%0A"
        + "Name: " + name + "%0A"
        + "Email: " + email + "%0A"
        + "Phone: " + phone + "%0A"
        + "Project Details: " + message;

    var phoneNumber = "919876543210";

    window.open("https://wa.me/" + phoneNumber + "?text=" + text, "_blank");
}
</script>

</body>
    </html>
